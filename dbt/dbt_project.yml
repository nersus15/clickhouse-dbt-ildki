# Main DBT CONFIG file
# Versi ClickHouse dari project ildki_transformations (sebelumnya StarRocks).

name: 'ildki_transformations_ch'
version: '1.0.0'
config-version: 2

# Harus sama dengan nama profile di profiles.yml
profile: 'clickhouse_db'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# CATATAN ARSITEKTUR (bronze -> silver -> gold):
# Semua model (baik ekstraksi 1:1 dari bronze maupun agregasi/join untuk chart Superset) ada
# dalam SATU folder models/staging/{aplikasi}/ -- untuk sekarang cuma models/staging/fhir/ --
# dan sama-sama ditulis ke database ClickHouse 'silver' (schema default dari profiles.yml /
# CLICKHOUSE_DATABASE). TIDAK ADA prefix stg_/mart_ pada nama tabel/view -- nama view sudah
# cukup jelas dari nama modelnya sendiri (mis. "conditions", "top_diagnosis").
#
# Materialized TIDAK di-set di level folder di sini, tapi eksplisit per-model lewat config()
# di tiap file .sql (opsi C -- lihat readme.md):
# - Model ekstraksi (mis. resource, conditions, observations) -> materialized='table'
#   (dedup FINAL + ekstraksi JSON dihitung sekali saat dbt run, bukan tiap kali chart dibuka)
# - Model agregasi/join untuk chart (mis. top_diagnosis, kpi_totals) -> materialized='view'
#   (murah karena sumbernya sudah berupa table bersih, bukan bronze mentah)
#
# Layer GOLD BELUM dipakai: rencananya gold baru dibuat nanti saat sudah perlu menggabungkan
# data dari lebih dari satu source aplikasi (mis. FHIR + Jaksimpus dkk). Macro
# macros/generate_schema_name.sql sudah disiapkan untuk saat itu tiba.
models:
  ildki_transformations_ch: {}
