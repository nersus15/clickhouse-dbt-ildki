version: 2

sources:
  - name: fhirhapi_prod
    # Layer BRONZE: hasil CDC PeerDB dari PostgreSQL (skema internal HAPI FHIR JPA server, FHIR R4)
    # Semua nama tabel fisik di ClickHouse punya prefix "public_" (nama schema Postgres asal).
    database: fhirhapi_prod
    tables:
      - name: hfj_resource
        identifier: public_hfj_resource
        description: "Metadata tiap resource FHIR (tipe, tanggal publish/update, status hapus)"
      - name: hfj_res_ver
        identifier: public_hfj_res_ver
        description: "Isi JSON lengkap tiap resource per versi (kolom res_text_vc)"
      - name: hfj_res_link
        identifier: public_hfj_res_link
        description: "Relasi antar-resource FHIR (mis. Encounter.serviceProvider -> Organization)"
      - name: hfj_spidx_token
        identifier: public_hfj_spidx_token
        description: "Indeks search parameter FHIR bertipe token (status, class, code)"

models:
  - name: stg_patients
    description: "Patient dan Encounter"
  - name: stg_resource
    description: "Metadata resource yang sudah dibersihkan (dedup CDC + normalisasi status hapus)"
  - name: stg_organizations
    description: "Daftar Puskesmas/faskes (Organization) dengan nama bersih"
  - name: stg_encounters
    description: "Kunjungan (Encounter) dengan status & kelas layanan terekstrak dari JSON"
  - name: stg_conditions
    description: "Diagnosis (Condition) dengan kode & nama ICD-10 terekstrak dari JSON"
  - name: stg_observations
    description: "Hasil pengukuran vital sign (Observation) terekstrak dari JSON"
  - name: stg_careplans
    description: "Rencana perawatan (CarePlan) dengan kategori & status terekstrak dari JSON"
  - name: stg_res_link
    description: "Relasi antar-resource, dipakai untuk join di layer marts (menghindari join berulang)"
